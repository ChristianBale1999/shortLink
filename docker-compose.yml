services:
  nginx:
    image: nginx:alpine
    container_name: shortlink_nginx
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - shortlink-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shortlink_php
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env
    networks:
      - shortlink-network

  mysql:
    image: mariadb:10.11
    container_name: shortlink_mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-shortlink_db}
      MYSQL_USER: ${DB_USER:-shortlink_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-shortlink_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shortlink-network

volumes:
  mysql-data:

networks:
  shortlink-network:
    driver: bridge