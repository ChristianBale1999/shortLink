services:
  nginx:
    image: nginx:alpine
    container_name: shortlink_nginx
    ports:
      - "80:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql
    networks:
      - shortlink-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: shortlink_php
    volumes:
      - ./app:/var/www/html
    env_file:
      - .env
    depends_on:
      - mysql
    networks:
      - shortlink-network

  mysql:
    image: mariadb:10.11
    container_name: shortlink_mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: DB_ROOT_PASSWORD
      MYSQL_DATABASE: DB_NAME
      MYSQL_USER: DB_USER
      MYSQL_PASSWORD: DB_PASSWORD
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - shortlink-network

  migrate:
    image: composer:latest
    container_name: shortlink_migrate
    volumes:
      - ./app:/app
    working_dir: /app
    command: >
      sh -c "
        composer install --no-interaction &&
        php yii migrate/up --interactive=0
      "
    depends_on:
      - mysql
    networks:
      - shortlink-network
    restart: "no"

volumes:
  mysql-data:

networks:
  shortlink-network:
    driver: bridge